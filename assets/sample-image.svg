<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <!-- 背景 -->
  <rect width="400" height="250" fill="#f5f5f5"/>
  <!-- 黒板 -->
  <rect x="20" y="20" width="360" height="180" rx="4" fill="#2d5a3d"/>
  <rect x="30" y="30" width="340" height="160" rx="2" fill="#336b47"/>
  <!-- チョーク文字 -->
  <text x="200" y="90" font-family="serif" font-size="28" fill="white" text-anchor="middle">授業スライド</text>
  <text x="200" y="130" font-family="serif" font-size="18" fill="#d4edda" text-anchor="middle">Marpで作りました</text>
  <!-- チョーク棚 -->
  <rect x="20" y="200" width="360" height="20" fill="#8b7355"/>
  <!-- チョーク -->
  <rect x="40" y="203" width="30" height="12" rx="3" fill="white"/>
  <rect x="80" y="203" width="30" height="12" rx="3" fill="#ffcccc"/>
  <rect x="120" y="203" width="30" height="12" rx="3" fill="#ccddff"/>
</svg>
